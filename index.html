/* ---------- utils ---------- */
function uid(p){ return `${p}-${Date.now()}-${Math.random().toString(36).slice(2,8)}`; }
function toISODate(d){ const dt=new Date(d); return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,"0")}-${String(dt.getDate()).padStart(2,"0")}`; }
function fmtDate(d){ if(!d) return ""; return new Date(d).toLocaleDateString("ko-KR",{month:"short",day:"numeric",weekday:"short"}); }
function fmtDateTime(d){ return new Date(d).toLocaleString("ko-KR",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"}); }
function daysUntil(d){ if(!d) return null; const t=new Date(); t.setHours(0,0,0,0); const x=new Date(d); x.setHours(0,0,0,0); return Math.round((x-t)/86400000); }
function whenLabel(item){ if(!item.date) return ""; return item.all_day===false && item.time ? `${fmtDate(item.date)} · ${item.time}` : fmtDate(item.date); }
function catById(id){ return categories.find(c=>c.id===id) || {name:"미분류", color:"#999"}; }
function esc(s){ return (s||"").replace(/[&<>"']/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])); }

const DAYS_BEFORE_LABELS = { 0:"당일", 1:"1일 전", 2:"2일 전" };
function getReminders(item){
  if(item.reminders && item.reminders.length) return item.reminders;
  if(item.reminder_time) return [{ id: uid("rem"), daysBefore:0, time:item.reminder_time }];
  return [];
}
function reminderSummary(item){
  return getReminders(item).map(r=>`${DAYS_BEFORE_LABELS[r.daysBefore]||"당일"} ${r.time}`).join(", ");
}
function hourOptions(selected){
  let s=""; for(let h=0;h<24;h++){ const v=String(h).padStart(2,"0"); s+=`<option value="${v}" ${v===selected?"selected":""}>${v}시</option>`; } return s;
}
function minuteOptions(selected){
  let s=""; for(let m=0;m<60;m+=5){ const v=String(m).padStart(2,"0"); s+=`<option value="${v}" ${v===selected?"selected":""}>${v}분</option>`; } return s;
}
function reminderRowHTML(r, idx){
  const [h,m] = (r.time||"09:00").split(":");
  return `
    <div class="flex items-center gap-2 mb-2 reminder-row" data-idx="${idx}" style="flex-wrap:wrap;">
      <select class="input rem-days" style="flex:1;min-width:90px;">
        ${[0,1,2].map(d=>`<option value="${d}" ${r.daysBefore===d?"selected":""}>${DAYS_BEFORE_LABELS[d]}</option>`).join("")}
      </select>
      <select class="input rem-hour" style="width:68px;">${hourOptions(h)}</select>
      <select class="input rem-min" style="width:68px;">${minuteOptions(m)}</select>
      <button type="button" class="rem-remove text-faint" data-idx="${idx}">✕</button>
    </div>
  `;
}
function createReminderEditor(container, initial){
  let reminders = (initial||[]).map(r=>({...r}));
  function sync(){
    container.querySelectorAll(".reminder-row").forEach(row=>{
      const idx = Number(row.dataset.idx);
      reminders[idx] = {
        id: reminders[idx].id,
        daysBefore: Number(row.querySelector(".rem-days").value),
        time: `${row.querySelector(".rem-hour").value}:${row.querySelector(".rem-min").value}`,
      };
    });
  }
  function renderRows(){
    container.querySelector(".reminder-rows").innerHTML = reminders.length
      ? reminders.map(reminderRowHTML).join("")
      : `<p class="text-xs text-faint mb-2">등록된 알림이 없습니다</p>`;
    container.querySelectorAll(".reminder-row select").forEach(sel=> sel.addEventListener("change", sync));

      btn.addEventListener("click", ()=>{ sync(); reminders.splice(Number(btn.dataset.idx),1); renderRows(); });
    });
  }
  container.querySelector(".rem-add").addEventListener("click", ()=>{
    sync();
    reminders.push({ id: uid("rem"), daysBefore:0, time:"09:00" });
    renderRows();
  });
  renderRows();
  return { get: ()=>{ sync(); return reminders; } };
}

/* ---------- Supabase REST ---------- */
async function apiGet(table, query=""){
  const r = await fetch(`${REST}/${table}?select=*${query}`, { headers: HEADERS });
  if(!r.ok) throw new Error(`GET ${table} failed`);
  return r.json();
}
async function apiInsert(table, row){
  const r = await fetch(`${REST}/${table}`, { method:"POST", headers:{...HEADERS, Prefer:"return=representation"}, body: JSON.stringify(row) });
  if(!r.ok) throw new Error(`INSERT ${table} failed`);
  return (await r.json())[0];
}
async function apiUpdate(table, id, patch){
  const r = await fetch(`${REST}/${table}?id=eq.${encodeURIComponent(id)}`, { method:"PATCH", headers:{...HEADERS, Prefer:"return=representation"}, body: JSON.stringify(patch) });
  if(!r.ok) throw new Error(`UPDATE ${table} failed`);
  return (await r.json())[0];
}
async function apiDelete(table, id){
  const r = await fetch(`${REST}/${table}?id=eq.${encodeURIComponent(id)}`, { method:"DELETE", headers: HEADERS });
  if(!r.ok) throw new Error(`DELETE ${table} failed`);
}
async function apiUpdateWhere(table, filterQuery, patch){
  const r = await fetch(`${REST}/${table}?${filterQuery}`, { method:"PATCH", headers: HEADERS, body: JSON.stringify(patch) });
  if(!r.ok) throw new Error(`UPDATE(where) ${table} failed`);
}

async function loadAll(){
  [categories, items] = await Promise.all([
    apiGet("categories", "&order=created_at.asc"),
    apiGet("items", "&order=updated_at.desc"),

}

      created_at: now,
      updated_at: now,
    };
    const created = await apiInsert("items", row);
    items = [created, ...items];

    alert("저장에 실패했습니다: " + err.message + "\n(Supabase 설정/마이그레이션 SQL을 확인해주세요)");

  }
}

      reminders: payload.reminders || [],
      assignees: payload.assignees || [],
      content: payload.content || "",
      created_at: now,
    };
    const newLogs = [...(parent.logs||[]), entry];
    const updated = await apiUpdate("items", parentId, { logs: newLogs, updated_at: now });
    items = items.map(i=>i.id===updated.id?updated:i);
    selectedItemId = updated.id;
    closeAllModals();
    render();
    if(openLayers>0){ try{ history.replaceState({ openLayers }, ""); }catch(e){} }
    else layerOpened();
  }catch(err){
    alert("저장에 실패했습니다: " + err.message);
    console.error(err);
  }
}

// 배경(backdrop)에서 mousedown과 click(mouseup)이 모두 배경 위에서 일어났을 때만 닫음.
// (모달 안에서 텍스트를 드래그해서 선택하다가 배경 위에서 마우스를 떼는 경우 실수로 닫히는 것을 방지)
function setupBackdropClose(backdrop, onClose){
  let downOnBackdrop = false;
  backdrop.addEventListener("mousedown", (e)=>{ downOnBackdrop = (e.target===backdrop); });
  backdrop.addEventListener("click", (e)=>{
    if(e.target===backdrop && downOnBackdrop){ (onClose||(()=>backdrop.remove()))(); }
  });
}

function collectCalendarEvents(scopedItems){
  const events = [];
  scopedItems.forEach(item=>{
    if(item.date){
      events.push({
        parentId: item.id, categoryId: item.category_id, title: item.title, subtitle: item.subtitle||"",
        date: item.date, all_day: item.all_day, time: item.time, location: item.location||"",
        assignees: item.assignees||[], status: item.status, isSub:false, item,
      });
    }
    (item.logs||[]).forEach(log=>{
      if(log.date){
        events.push({
          parentId: item.id, categoryId: item.category_id, title: item.title, subtitle: log.subtitle||"",
          date: log.date, all_day: log.all_day, time: log.time, location: log.location||"",
          assignees: log.assignees||[], status: item.status, isSub:true, item, log,
        });
      }
    });
  });
  return events;
}

function renderCalendarHTML(){
  const year = monthCursor.getFullYear();
  const month = monthCursor.getMonth();
  const firstDay = new Date(year, month, 1);
  const startWeekday = firstDay.getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const todayISO = toISODate(new Date());
  const scoped = activeCat==="all" ? items : items.filter(i=>i.category_id===activeCat);
  const events = collectCalendarEvents(scoped);
  const byDate = {};
  events.forEach(e=>{ (byDate[e.date] = byDate[e.date]||[]).push(e); });

  let cells = "";
  for(let i=0;i<startWeekday;i++) cells += `<div class="cal-cell empty"></div>`;
  for(let d=1; d<=daysInMonth; d++){
    const iso = `${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const dayItems = byDate[iso] || [];
    const isToday = iso===todayISO;
    const isSelected = iso===selectedDate;
    const dotsHtml = dayItems.slice(0,5).map(e=>
      `<span class="cal-dot" style="background:${catById(e.categoryId).color}"></span>`
    ).join("");
    const chipsHtml = dayItems.slice(0,3).map(e=>
      `<div class="cal-chip" style="background:${catById(e.categoryId).color}" data-action="open-item" data-id="${e.parentId}">${esc(e.subtitle ? `${e.title} · ${e.subtitle}` : e.title)}</div>`
    ).join("");
    const moreHtml = dayItems.length>3 ? `<div class="cal-chip-more">+${dayItems.length-3}</div>` : "";
    cells += `<div class="cal-cell ${isToday?"today":""} ${isSelected?"selected":""}" data-action="pick-date" data-date="${iso}">
      <div class="text-sm day-num" style="text-align:center;font-weight:600;">${d}</div>
      <div class="cal-dots">${dotsHtml}</div>
      <div class="cal-chips-desktop">${chipsHtml}${moreHtml}</div>
    </div>`;
  }

  return `
    <div class="cal-grid mb-2">
      <div class="cal-head">
        <button data-action="prev-month" class="text-muted">‹</button>
        <span class="font-display text-sm font-semibold">${year}년 ${month+1}월</span>
        <button data-action="next-month" class="text-muted">›</button>
      </div>
      <div class="cal-weekdays">${WEEKDAYS.map(w=>`<div>${w}</div>`).join("")}</div>
      <div class="cal-body">${cells}</div>
    </div>
  `;
}

function bindMainBodyEvents(){
  document.querySelectorAll('[data-action="open-item"]').forEach(el=>{
    el.addEventListener("click", (e)=>{
      e.stopPropagation();
      const wasClosed = !selectedItemId;
      selectedItemId = el.dataset.id;
      renderDetailPage();
      if(wasClosed) layerOpened();
    });
  });
  document.querySelectorAll('[data-action="delete-item"]').forEach(el=>{
    el.addEventListener("click", (e)=>{
      e.stopPropagation();
      const item = items.find(i=>i.id===el.dataset.id);
      if(item && confirm(`"${item.title}" 건을 삭제할까요?`)) deleteItem(el.dataset.id);
    });
  });
  document.querySelectorAll('[data-action="pick-date"]').forEach(el=>{
    el.addEventListener("click", ()=>{
      const d = el.dataset.date;
      if(selectedDate===d){ openNewItemModal(d); }
      else { selectedDate = d; render(); }
    });
  });
  const addOnSelected = document.querySelector('[data-action="add-on-selected-date"]');
  if(addOnSelected) addOnSelected.addEventListener("click", ()=> openNewItemModal(selectedDate));
}

function attachGlobalHandlers(){
  document.querySelectorAll('[data-action="set-cat"]').forEach(el=>{
    el.addEventListener("click", ()=>{ activeCat = el.dataset.cat; selectedDate=null; viewMode="calendar"; render(); });
  });
  document.querySelectorAll('[data-action="set-view"]').forEach(el=>{
    el.addEventListener("click", ()=>{
      const target = el.dataset.view;
      if(target===viewMode) return;
      if(target==="list" && viewMode==="calendar"){
        viewMode = "list"; render(); layerOpened();
      } else if(target==="calendar" && viewMode==="list"){
        requestClose();
      } else {
        viewMode = target; render();
      }
    });
  });
  const openNewItemBtn = document.querySelector('[data-action="open-new-item"]');
  if(openNewItemBtn) openNewItemBtn.addEventListener("click", ()=> openNewItemModal());
  const openNewCatBtn = document.querySelector('[data-action="open-new-cat"]');
  if(openNewCatBtn) openNewCatBtn.addEventListener("click", ()=> openCategoryManagerModal());
  const prevMonth = document.querySelector('[data-action="prev-month"]');
  if(prevMonth) prevMonth.addEventListener("click", ()=>{ monthCursor = new Date(monthCursor.getFullYear(), monthCursor.getMonth()-1, 1); render(); });
  const nextMonth = document.querySelector('[data-action="next-month"]');
  if(nextMonth) nextMonth.addEventListener("click", ()=>{ monthCursor = new Date(monthCursor.getFullYear(), monthCursor.getMonth()+1, 1); render(); });
}

        <button class="btn-forest" data-action="submit-log" style="padding:10px 14px;">＋</button>
      </div>
    </div>
  `;
  bindDetailEvents(item);
}

function bindDetailEvents(item){
  const container = document.getElementById("detail-page");
  container.querySelector('[data-action="close-detail"]').addEventListener("click", ()=> requestClose());
  container.querySelector('[data-action="delete-item-detail"]').addEventListener("click", ()=>{
    if(confirm(`"${item.title}" 건을 삭제할까요?`)) deleteItem(item.id);
  });
  container.querySelector('[data-action="edit-item"]').addEventListener("click", ()=> openEditItemModal(item));
  container.querySelectorAll('[data-action="set-status"]').forEach(el=>{
    el.addEventListener("click", ()=> setStatus(item.id, el.dataset.status));
  });
  const convertBtn = container.querySelector('[data-action="convert-progress"]');
  if(convertBtn) convertBtn.addEventListener("click", ()=> convertToProgress(item.id));
  container.querySelectorAll('[data-action="open-item"]').forEach(el=>{
    el.addEventListener("click", ()=>{ selectedItemId = el.dataset.id; renderDetailPage(); });
  });
  container.querySelector('[data-action="submit-log"]').addEventListener("click", ()=>{
    const ta = container.querySelector("#log-draft");
    const val = ta.value.trim();
    if(!val) return;
    addLog(item.id, val);
  });
}

    const inp = backdrop.querySelector("#f-assignee-input");
    const name = inp.value.trim();
    if(name && !assignees.includes(name)) assignees.push(name);
    inp.value = "";
    renderAssigneeChips();
  });
  wireAssigneeSuggestions(
    backdrop.querySelector("#f-assignee-input"),
    backdrop.querySelector("#assignee-suggestions"),
    ()=>assignees,
    (name)=>{ if(!assignees.includes(name)) assignees.push(name); renderAssigneeChips(); }
  );
  backdrop.querySelector("#f-assignee-input").addEventListener("keydown", (e)=>{
    if(e.key==="Enter"){ e.preventDefault(); backdrop.querySelector("#f-add-assignee").click(); }
  });
  backdrop.querySelector("#f-allday").addEventListener("change", (e)=>{
    backdrop.querySelector("#f-time").classList.toggle("hidden", e.target.checked);
  });

  backdrop.querySelector("#f-submit").addEventListener("click", ()=>{
    const title = backdrop.querySelector("#f-title").value.trim();
    if(!title) return;
    updateItem(item.id, {
      categoryId: selectedCategoryId,
      title,
      subtitle: backdrop.querySelector("#f-subtitle").value.trim(),
      date: backdrop.querySelector("#f-date").value,
      allDay: backdrop.querySelector("#f-allday").checked,
      time: backdrop.querySelector("#f-time").value,
      location: backdrop.querySelector("#f-location").value,
      reminders: reminderEditor.get(),
      assignees,
    });
    returnToCalendar();
  });
}

/* ---------- 카테고리 관리 모달 (목록/수정/삭제/추가) ---------- */
function openCategoryManagerModal(isRefresh){
  closeAllModals();
  const backdrop = document.createElement("div");
  backdrop.className = "modal-backdrop";
  backdrop.innerHTML = `
    <div class="modal-panel" style="max-width:420px;">
      <div class="flex items-center justify-between mb-4">
        <h3 class="font-display text-lg font-semibold">카테고리 관리</h3>
        <button data-action="close-modal" style="font-size:22px;line-height:1;padding:6px 10px;">✕</button>
      </div>
      <div id="cat-list" class="mb-4"></div>
      <div class="border-t" style="padding-top:16px;">
        <label class="label">새 카테고리 추가</label>
        <input id="f-cat-name" class="input mb-3" placeholder="예: 재고관리" />
        <div class="flex gap-2 mb-3" id="color-picker">
          ${PALETTE.map((c,idx)=>`<button type="button" class="color-option" data-color="${c}" style="width:28px;height:28px;border-radius:999px;background:${c};border:${idx===0?"2px solid var(--c-ink)":"2px solid transparent"};"></button>`).join("")}
        </div>
        <button class="btn-forest w-full" id="f-submit">추가하기</button>
      </div>
    </div>
  `;
  document.body.appendChild(backdrop);
  if(!isRefresh) layerOpened();
  setupBackdropClose(backdrop, requestClose);
  backdrop.querySelector('[data-action="close-modal"]').addEventListener("click", requestClose);

  function renderCatList(){
    const listEl = backdrop.querySelector("#cat-list");
    listEl.innerHTML = categories.map(c=>{
      const isDefault = DEFAULT_CAT_IDS.includes(c.id);
      const count = items.filter(i=>i.category_id===c.id).length;
      return `
        <div class="cat-row flex items-center gap-2 mb-2" data-id="${c.id}">
          <span style="width:16px;height:16px;border-radius:999px;background:${c.color};flex-shrink:0;"></span>
          <input class="input cat-name-input" value="${esc(c.name)}" style="flex:1;" />
          <input type="color" class="cat-color-input" value="${c.color}" style="width:32px;height:32px;padding:0;border:1px solid var(--c-border);border-radius:8px;" />
          <button type="button" class="btn-soft cat-save" data-id="${c.id}">저장</button>
          ${isDefault
            ? `<span class="text-11 text-faint" style="width:20px;text-align:center;" title="기본 카테고리는 삭제할 수 없습니다">🔒</span>`
            : `<button type="button" class="text-danger cat-delete" data-id="${c.id}" data-count="${count}" title="삭제">🗑</button>`}
        </div>
      `;
    }).join("");

    listEl.querySelectorAll(".cat-save").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        const row = listEl.querySelector(`.cat-row[data-id="${btn.dataset.id}"]`);
        const name = row.querySelector(".cat-name-input").value.trim();
        const color = row.querySelector(".cat-color-input").value;
        if(!name) return;
        updateCategory(btn.dataset.id, name, color);
      });
    });
    listEl.querySelectorAll(".cat-delete").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        const count = Number(btn.dataset.count);
        const msg = count>0
          ? `이 카테고리를 쓰는 건이 ${count}개 있습니다. 삭제하면 그 건들은 "미분류"로 남습니다. 계속할까요?`
          : "이 카테고리를 삭제할까요?";
        if(confirm(msg)) deleteCategory(btn.dataset.id);
      });
    });
  }
  renderCatList();

  let newColor = PALETTE[0];
  backdrop.querySelectorAll(".color-option").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      newColor = btn.dataset.color;
      backdrop.querySelectorAll(".color-option").forEach(b=> b.style.border = "2px solid transparent");
      btn.style.border = "2px solid var(--c-ink)";
    });
  });
  backdrop.querySelector("#f-submit").addEventListener("click", ()=>{
    const name = backdrop.querySelector("#f-cat-name").value.trim();
    if(!name) return;
    createCategory(name, newColor);
  });
}

/* ---------- 비밀번호 게이트 ---------- */
let currentUser = "나";
function checkPassword(){
  const input = document.getElementById("password-input").value;
  const matched = APP_USERS.find(u=>u.password===input);
  if(matched){
    sessionStorage.setItem("ptk_authed", "1");
    sessionStorage.setItem("ptk_user", matched.name);
    currentUser = matched.name;
    startApp();
  } else {
    document.getElementById("password-error").classList.remove("hidden");
  }
}
document.getElementById("password-submit").addEventListener("click", checkPassword);
document.getElementById("password-input").addEventListener("keydown", (e)=>{ if(e.key==="Enter") checkPassword(); });

async function startApp(){
  document.getElementById("password-screen").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  try{
    await loadAll();
    requestNotificationPermission();
    startPolling();
  }catch(err){
    document.getElementById("app").innerHTML = `<div style="padding:40px;text-align:center;color:var(--c-danger);">
      데이터를 불러오지 못했습니다. SUPABASE_URL / SUPABASE_ANON_KEY 설정을 확인해주세요.<br/><span style="font-size:12px;color:var(--c-faint);">${esc(err.message)}</span>
    </div>`;
  }
}

async function requestNotificationPermission(){
  if(!("Notification" in window)) return;
  if(Notification.permission==="default"){
    const perm = await Notification.requestPermission();
    if(perm==="granted") subscribeToPush();
  } else if(Notification.permission==="granted"){
    subscribeToPush();
  }
}

function urlBase64ToUint8Array(base64String){
  const padding = "=".repeat((4 - (base64String.length % 4)) % 4);
  const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
  const rawData = atob(base64);
  const outputArray = new Uint8Array(rawData.length);
  for(let i=0;i<rawData.length;i++) outputArray[i] = rawData.charCodeAt(i);
  return outputArray;
}

async function subscribeToPush(){
  if(!("serviceWorker" in navigator) || !("PushManager" in window)) return;
  try{
    const reg = await navigator.serviceWorker.register("sw.js");
    let sub = await reg.pushManager.getSubscription();
    if(!sub){
      sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY),
      });
    }
    const subJson = sub.toJSON();
    await fetch(`${REST}/push_subscriptions?on_conflict=endpoint`, {
      method: "POST",
      headers: { ...HEADERS, Prefer: "resolution=merge-duplicates" },
      body: JSON.stringify({ user_name: currentUser, endpoint: subJson.endpoint, subscription: subJson }),
    });
  }catch(e){
    console.error("푸시 구독 실패", e);
  }
}

function notify(title, body){
  if("Notification" in window && Notification.permission==="granted"){
    try{ new Notification(title, { body, icon: "icon-192.png" }); }catch(e){}
  }
}

function detectAndNotifyChanges(prevItems, newItems){
  const prevById = {};
  prevItems.forEach(i=> prevById[i.id]=i);

  newItems.forEach(ni=>{
    const prev = prevById[ni.id];
    if(!prev){
      // 새로 생긴 건
      if(ni.created_by && ni.created_by!==currentUser){
        notify("새 건 등록", `${ni.created_by}님이 등록: [${catById(ni.category_id).name}] ${ni.title}`);
      }
      return;
    }
    // 기존 건에 새 진행 기록이 추가된 경우
    const prevLogCount = (prev.logs||[]).length;
    const newLogs = ni.logs||[];
    if(newLogs.length>prevLogCount){
      newLogs.slice(prevLogCount).forEach(log=>{
        if(log.author && log.author!==currentUser){
          notify("새 진행 기록", `${log.author}님: ${ni.title}${log.subtitle ? " · "+log.subtitle : ""}`);
        }
      });
    }
  });
}

function startPolling(){
  setInterval(async ()=>{
    // 입력 중인 모달이나 글 작성 중이면 건드리지 않음
    if(document.querySelector(".modal-backdrop")) return;
    const logDraftEl = document.getElementById("log-draft");
    if(logDraftEl && logDraftEl.value.trim()) return;
    try{
      const [newCats, newItems] = await Promise.all([
        apiGet("categories", "&order=created_at.asc"),
        apiGet("items", "&order=updated_at.desc"),
      ]);
      const changed = JSON.stringify(newCats)!==JSON.stringify(categories) || JSON.stringify(newItems)!==JSON.stringify(items);
      if(changed){
        // 실제 웹 푸시(서비스워커)가 알림을 담당하므로, 여기서 추가로 브라우저 알림을 띄우지 않음(중복 방지)
        categories = newCats;
        items = newItems;
        render();
      }
    }catch(e){ /* 일시적인 네트워크 오류는 무시하고 다음 주기에 재시도 */ }
  }, 5000);
}

if(sessionStorage.getItem("ptk_authed")==="1"){
  currentUser = sessionStorage.getItem("ptk_user") || "나";
  startApp();
}
</script>
